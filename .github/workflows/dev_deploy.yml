# STT DataCore Beta Website Build Pipeline

name: Website CI Deploy Dev

# Controls when the action will run. Triggers the workflow on push
# events but only for the master branch
on:
  push:
    branches: [ dev ]
#   paths-ignore: [ static/structured/** ]

#   workflow_run:
#     workflows: ["sync-dev"]
#     types:
#       - completed

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
        with:
            ref: dev

      - uses: actions/setup-node@v2
        with:
          node-version: '22'

      # Runs a single command using the runners shell
      - name: Build project
        env:
          VITE_DATACORE_URL: https://dev.datacore.app/
          VITE_ASSETS_URL: https://assets.datacore.app/
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CI: false
        run: |
          yarn
          npm run build

      # Install our SSH Key into build server
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PROD_SSH_KEY }}
          known_hosts: ${{ secrets.PROD_KNOWN_HOSTS }}

      # Runs a set of commands using the runners shell
      - name: Rsync over ssh
        run: |
          rsync -avz --progress --delete ./build/ ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:~/data/dev-site/

      # Clear the cloudflare cache
      - name: Cloudflare Cache Cleaner
        uses: Cyb3r-Jak3/action-cloudflare-cache@v3.0.0
        with:
            zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}
            api_token: ${{ secrets.CLOUDFLARE_TOKEN }}
